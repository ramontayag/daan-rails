name: Sync develop with main

on:
  push:
    branches: [main]

jobs:
  sync-develop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Reset develop to main
        run: |
          git push --force origin main:develop
