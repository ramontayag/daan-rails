        execution timeout in seconds (default: 10, max: 1800)"}},"required":["file_path"],"additionalProperties":false,"strict":true}},{"name":"MemoryGlob","description":"Search
        your memory entries using glob patterns (like filesystem glob).\n\nREQUIRED:
        Provide the pattern parameter - the glob pattern to match entries against.\n\n**Parameters:**\n-
        pattern (REQUIRED): Glob pattern with wildcards (e.g., ''**/*.txt'', ''parallel/*/task_*'',
        ''skill/**'')\n\n**Glob Pattern Syntax (Standard Ruby Glob):**\n- `*` - matches
        .md files at a single directory level (e.g., ''fact/*'' → fact/*.md)\n- `**`
        - matches .md files recursively at any depth (e.g., ''fact/**'' → fact/**/*.md)\n-
        `?` - matches any single character (e.g., ''task_?'')\n- `[abc]` - matches
        any character in the set (e.g., ''task_[0-9]'')\n\n**Returns:**\nList of matching
        .md memory entries with:\n- Full memory:// path\n- Entry title\n- Size in
        bytes/KB/MB\n\n**Note**: Only returns .md files (actual memory entries), not
        directory entries.\n\n**MEMORY STRUCTURE (4 Fixed Categories Only):**\nALL
        patterns MUST target one of these 4 categories:\n- concept/{domain}/** - Abstract
        ideas\n- fact/{subfolder}/** - Concrete information\n- skill/{domain}/** -
        Procedures\n- experience/** - Lessons\nINVALID: documentation/, reference/,
        parallel/, analysis/, tutorial/\n\n**Common Use Cases:**\n```\n# Find direct
        .md files in fact/\nMemoryGlob(pattern: \"fact/*\")\nResult: fact/api.md (only
        direct children, not nested)\n\n# Find ALL facts recursively\nMemoryGlob(pattern:
        \"fact/**\")\nResult: fact/api.md, fact/people/john.md, fact/people/jane.md,
        ...\n\n# Find all skills recursively\nMemoryGlob(pattern: \"skill/**\")\nResult:
        skill/debugging/api-errors.md, skill/meta/deep-learning.md, ...\n\n# Find
        all concepts in a domain\nMemoryGlob(pattern: \"concept/ruby/**\")\nResult:
        concept/ruby/classes.md, concept/ruby/modules.md, ...\n\n# Find direct files
        in fact/people/\nMemoryGlob(pattern: \"fact/people/*\")\nResult: fact/people/john.md,
        fact/people/jane.md (not fact/people/teams/x.md)\n\n# Find all experiences\nMemoryGlob(pattern:
        \"experience/**\")\nResult: experience/fixed-cors-bug.md, experience/optimization.md,
        ...\n\n# Find debugging skills recursively\nMemoryGlob(pattern: \"skill/debugging/**\")\nResult:
        skill/debugging/api-errors.md, skill/debugging/performance.md, ...\n\n# Find
        all entries (all categories)\nMemoryGlob(pattern: \"**/*\")\nResult: All .md
        entries across all 4 categories\n```\n\n**Understanding * vs **:**\n- `fact/*`
        matches only direct .md files: fact/api.md\n- `fact/**` matches ALL .md files
        recursively: fact/api.md, fact/people/john.md, ...\n- To explore subdirectories,
        use recursive pattern and examine returned paths\n\n**When to Use MemoryGlob:**\n-
        Discovering what''s in a memory hierarchy\n- Finding all entries matching
        a naming convention\n- Locating related entries by path pattern\n- Exploring
        memory structure before reading specific entries\n- Batch operations preparation
        (find all, then process each)\n\n**Combining with Other Tools:**\n1. Use MemoryGlob
        to find candidates\n2. Use MemoryRead to examine specific entries\n3. Use
        MemoryEdit/MemoryDelete to modify/remove them\n\n**Tips:**\n- Start with broad
        patterns and narrow down\n- Use `**` for recursive searching entire hierarchies\n-
        Combine with MemoryGrep if you need content-based search\n- Check entry sizes
        to identify large entries\n","input_schema":{"type":"object","properties":{"pattern":{"type":"string","description":"Glob
        pattern - target concept/, fact/, skill/, or experience/ only (e.g., ''skill/**'',
