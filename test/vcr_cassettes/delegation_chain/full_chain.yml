        pattern (REQUIRED): Glob pattern with wildcards (e.g., ''**/*.txt'', ''parallel/*/task_*'',
        ''skill/**'')\n\n**Glob Pattern Syntax (Standard Ruby Glob):**\n- `*` - matches
