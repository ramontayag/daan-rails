        all whitespace and indentation\n- new_string (REQUIRED): The replacement text
        - must be different from old_string\n\n**MEMORY STRUCTURE (4 Fixed Categories
        Only):**\n- concept/{domain}/{name}.md - Abstract ideas\n- fact/{subfolder}/{name}.md
        - Concrete information\n- skill/{domain}/{name}.md - Procedures\n- experience/{name}.md
        - Lessons\nINVALID: documentation/, reference/, analysis/, parallel/, tutorial/\n\n**Optional
        Parameters:**\n- replace_all: Set to true to replace all occurrences (default:
        false, replaces only first occurrence)\n\n**CRITICAL - Before Using This Tool:**\n1.
