        all entries (all categories)\nMemoryGlob(pattern: \"**/*\")\nResult: All .md
        entries across all 4 categories\n```\n\n**Understanding * vs **:**\n- `fact/*`
        matches only direct .md files: fact/api.md\n- `fact/**` matches ALL .md files
        recursively: fact/api.md, fact/people/john.md, ...\n- To explore subdirectories,
        use recursive pattern and examine returned paths\n\n**When to Use MemoryGlob:**\n-
        Discovering what''s in a memory hierarchy\n- Finding all entries matching
        a naming convention\n- Locating related entries by path pattern\n- Exploring
        memory structure before reading specific entries\n- Batch operations preparation
        (find all, then process each)\n\n**Combining with Other Tools:**\n1. Use MemoryGlob
        to find candidates\n2. Use MemoryRead to examine specific entries\n3. Use
        MemoryEdit/MemoryDelete to modify/remove them\n\n**Tips:**\n- Start with broad
        patterns and narrow down\n- Use `**` for recursive searching entire hierarchies\n-
        Combine with MemoryGrep if you need content-based search\n- Check entry sizes
