        Keep entries that might provide historical context\n5. Don''t delete skills
        unless you''re certain they won''t be needed\n\n**Alternative to Deletion:**\nInstead
        of deleting, consider:\n- Updating entries to mark them as archived\n- Consolidating
        multiple entries into one comprehensive entry\n- Moving entries to an \"archive/\"
        hierarchy for later reference\n","input_schema":{"type":"object","properties":{"file_path":{"type":"string","description":"Path
