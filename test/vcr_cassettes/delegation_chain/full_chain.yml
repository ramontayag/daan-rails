        execution timeout in seconds (default: 10, max: 1800)"}},"required":["pattern"],"additionalProperties":false,"strict":true}},{"name":"MemoryGrep","description":"Search
        your memory content using regular expression patterns (like grep).\n\nREQUIRED:
        Provide the pattern parameter - the regex pattern to search for in entry content.\n\nMEMORY
        STRUCTURE: Searches across all 4 fixed categories (concept/, fact/, skill/,
        experience/)\nNO OTHER top-level categories exist.\n\n**Required Parameters:**\n-
        pattern (REQUIRED): Regular expression pattern to search for (e.g., ''status:
        pending'', ''TODO.*urgent'', ''\\btask_\\d+\\b'')\n\n**Optional Parameters:**\n-
        path: Limit search to specific path (e.g., ''concept/'', ''fact/api-design/'',
        ''skill/ruby'')\n- case_insensitive: Set to true for case-insensitive search
        (default: false)\n- output_mode: Choose output format - ''files_with_matches''
        (default), ''content'', or ''count''\n\n**Output Modes Explained:**\n1. **files_with_matches**
        (default): Just shows which entries contain matches\n   - Fast and efficient
        for discovery\n   - Use when you want to know WHERE matches exist\n\n2. **content**:
        Shows matching lines with line numbers\n   - See the actual matching content\n   -
        Use when you need to read the matches in context\n\n3. **count**: Shows how
        many matches in each entry\n   - Quantify occurrences\n   - Use for statistics
        or finding entries with most matches\n\n**Regular Expression Syntax:**\n-
        Literal text: ''status: pending''\n- Any character: ''task.done''\n- Character
        classes: ''[0-9]+'' (digits), ''[a-z]+'' (lowercase)\n- Word boundaries: ''\\btodo\\b''
        (exact word)\n- Anchors: ''^Start'' (line start), ''end$'' (line end)\n- Quantifiers:
        ''*'' (0+), ''+'' (1+), ''?'' (0 or 1), ''{3}'' (exactly 3)\n- Alternation:
        ''pending|in-progress|blocked''\n\n**Path Parameter - Directory-Style Filtering:**\nThe
        path parameter works just like searching in directories:\n- ''concept/'' -
        Search only concept entries\n- ''fact/api-design'' - Search only in fact/api-design
        (treats as directory)\n- ''fact/api-design/'' - Same as above\n- ''skill/ruby/blocks.md''
        - Search only that specific file\n\n**Examples:**\n```\n# Find entries containing
        \"TODO\" (case-sensitive)\nMemoryGrep(pattern: \"TODO\")\n\n# Search only
        in concepts\nMemoryGrep(pattern: \"TODO\", path: \"concept/\")\n\n# Search
        in a specific subdirectory\nMemoryGrep(pattern: \"endpoint\", path: \"fact/api-design\")\n\n#
        Search a specific file\nMemoryGrep(pattern: \"lambda\", path: \"skill/ruby/blocks.md\")\n\n#
        Find entries with any status (case-insensitive)\nMemoryGrep(pattern: \"status:\",
        case_insensitive: true)\n\n# Show actual content of matches in skills only\nMemoryGrep(pattern:
        \"error|warning|failed\", path: \"skill/\", output_mode: \"content\")\n\n#
        Count how many times \"completed\" appears in experiences\nMemoryGrep(pattern:
        \"completed\", path: \"experience/\", output_mode: \"count\")\n\n# Find task
        numbers in facts\nMemoryGrep(pattern: \"task_\\d+\", path: \"fact/\")\n\n#
        Find incomplete tasks\nMemoryGrep(pattern: \"^- \\[ \\]\", output_mode: \"content\")\n\n#
        Find entries mentioning specific functions\nMemoryGrep(pattern: \"\\bprocess_data\\(\")\n```\n\n**Use
        Cases:**\n- Finding entries by keyword or phrase\n- Locating TODO items or
        action items\n- Searching for error messages or debugging info\n- Finding
        entries about specific code/functions\n- Identifying patterns in your memory\n-
