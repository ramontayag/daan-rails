        Procedures\n- experience/** - Lessons\nINVALID: documentation/, reference/,
        parallel/, analysis/, tutorial/\n\n**Common Use Cases:**\n```\n# Find direct
        .md files in fact/\nMemoryGlob(pattern: \"fact/*\")\nResult: fact/api.md (only
        direct children, not nested)\n\n# Find ALL facts recursively\nMemoryGlob(pattern:
        \"fact/**\")\nResult: fact/api.md, fact/people/john.md, fact/people/jane.md,
