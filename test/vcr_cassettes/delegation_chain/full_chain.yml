        Combine with MemoryGrep if you need content-based search\n- Check entry sizes
        to identify large entries\n","input_schema":{"type":"object","properties":{"pattern":{"type":"string","description":"Glob
        pattern - target concept/, fact/, skill/, or experience/ only (e.g., ''skill/**'',
